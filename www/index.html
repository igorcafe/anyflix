<!DOCTYPE html>
<html>
<head>
  <script defer src="/alpine.min.js"></script>
  <link rel="stylesheet" href="/base.css">
</head>
<body x-data="search">
  <div id="container">
    <div id="search-container">
      <h2>Search</h2>
      <input
        id="search-input"
        type="text"
        x-model="query"
        @keydown.enter="search()"
        @input.debounce.500ms="search()"
        autofocus />
    </div>
    <div x-show="recent.length">
      <h2>recently viewed <div x-show="query.length >= 3">(filtered)</div></h2>
      <div class="content-list">
        <template x-for="r in recent">
          <button @click="openDetails(r)" class="content-card">
            <div @click.stop="removeRecent(r)" class="remove-recent">X</div>
            <div class="content-card-img-container">
              <img x-bind:src="r.poster">
            </div>
            <div class="content-card-title" x-text="r.name"></div>
          </button>
        </template>
      </div>
    </div>
    <div x-show="series.length">
      <h2>series</h2>
      <div class="content-list">
        <template x-for="s in series">
          <button @click="openDetails(s)" class="content-card">
            <div class="content-card-img-container">
              <img x-bind:src="s.poster">
            </div>
            <div class="content-card-title" x-text="s.name"></div>
          </button>
        </template>
      </div>
    </div>
    <div x-show="movies.length">
      <h2>movies</h2>
      <div class="content-list">
        <template x-for="m in movies">
          <button @click="openDetails(m)" class="content-card">
            <div class="content-card-img-container">
              <img x-bind:src="m.poster">
            </div>
            <div class="content-card-title" x-text="m.name"></div>
          </button>
        </template>
      </div>
    </div>
    <div x-show="popularSeries.length">
      <h2>popular series</h2>
      <div class="content-list">
        <template x-for="s in popularSeries">
          <button @click="openDetails(s)" class="content-card">
            <div class="content-card-img-container">
              <img x-bind:src="s.poster">
            </div>
            <div class="content-card-title" x-text="s.name"></div>
          </button>
        </template>
      </div>
    </div>
    <div x-show="popularMovies.length">
      <h2>popular movies</h2>
      <div class="content-list">
        <template x-for="m in popularMovies">
          <button @click="openDetails(m)" class="content-card">
            <div class="content-card-img-container">
              <img x-bind:src="m.poster">
            </div>
            <div class="content-card-title" x-text="m.name"></div>
          </button>
        </template>
      </div>
    </div>
  </div>
  <style>
    body {
        background-color: #333;
    }

    #container {
        padding: 10px;
    }

    #search-container {
        width: 100%;
        display: grid;
        grid-gap: 20px;
        place-items: center;
        padding: 20px 0;
    }

    #search-input {
        padding: 15px 30px;
        border-radius: 1000px;
        width: 400px;
        background-color: #666;
        filter: drop-shadow(2px 2px 5px #0001);
    }

    h2 {
        font-size: 28px;
        padding: 10px;
    }

    .content-list {
        width: 100%;
        height: 400px;
        overflow-x: auto;
        display: flex;
        gap: 15px;
    }

    .content-card {
        position: relative;
        padding: 10px;
        height: 100%;
        flex: 0 0 240px;
        width: 240px;
        display: flex;
        flex-direction: column;
        text-align: center;
        background-color: #0001;
    }

    .remove-recent {
        position: absolute;
        top: 0;
        right: -5px;
        border-radius: 50%;
        color: white;
        background-color: #666;
        width: 40px;
        height: 40px;
        display: grid;
        place-items: center;
    }

    .content-card-title {
        padding: 5px 0;
    }

    .content-card-img-container {
        width: 100%;
        flex: 1;
        overflow: hidden;
    }

    .content-card-img-container img {
        width: 100%;
    }
  </style>
  <script>
    document.addEventListener('alpine:init', () => {
        Alpine.data('search', () => ({
            query: '',
            movies: [],
            popularMovies: [],
            series: [],
            popularSeries: [],
            recent: [],
            searching: false,

            init() {
                const params = new URLSearchParams(window.location.search)
                this.query = params.get('q') ?? ''

                if (this.query.length >= 3) {
                    this.search()
                } else {
                    this.fetchPopularMovies()
                    this.fetchPopularSeries()
                    this.fetchRecent()
                }

                // window.addEventListener('popstate', () => {
                //     const params = new URLSearchParams(window.location.search)
                //     this.query = params.get('q') ?? ''
                //     this.fetchAllMetas()
                // })
            },

            async search() {
                if (this.searching) {
                    return
                }

                this.searching = true
                try {
                    await this._search()
                } finally {
                    this.searching = false
                }
            },

            async _search() {
                await this.fetchRecent()

                if (this.query.length < 3) {
                    this.movies = []
                    this.series = []
                    return
                }

                const url = new URL(window.location.href)
                url.searchParams.set('q', this.query)

                if (url.href !== location.href) {
                    window.location.href = url.href
                }

                const [movies, series] = await Promise.all([
                    this.fetchMeta('movie', this.query),
                    this.fetchMeta('series', this.query),
                ])

                this.movies = movies
                this.series = series
            },

            async fetchMeta(kind, query) {
                const resp = await fetch(`/api/meta/${kind}/search/${query}`)
                if (!resp.ok) {
                    throw new Error(resp.statusText)
                }
                return await resp.json()
            },

            async fetchRecent() {
                const resp = await fetch(`/api/recent`)
                if (!resp.ok) {
                    throw new Error(resp.statusText)
                }
                this.recent = await resp.json()

                if (this.query.length >= 3) {
                    this.recent = this.recent.filter(r => r.name.toLowerCase().includes(this.query.toLowerCase()))
                }
            },

            async fetchPopularMovies() {
                const resp = await fetch('https://cinemeta-catalogs.strem.io/top/catalog/movie/top.json ')
                if (!resp.ok) {
                    throw new Error(resp.statusText)
                }
                this.popularMovies = (await resp.json()).metas
            },

            async fetchPopularSeries() {
                const resp = await fetch('https://cinemeta-catalogs.strem.io/top/catalog/series/top.json ')
                if (!resp.ok) {
                    throw new Error(resp.statusText)
                }
                this.popularSeries = (await resp.json()).metas
            },

            async openDetails(content) {
                await this.addRecent(content)
                window.location.href = `/details/?type=${content.type}&id=${content.id}`
            },

            async addRecent(r) {
                const resp = await fetch(`/api/recent`, {
                    method: 'POST',
                    body: JSON.stringify(r),
                })
                if (!resp.ok) {
                    throw new Error(resp.statusText)
                }
            },

            async removeRecent(r) {
                const resp = await fetch(`/api/recent/${r.id}`, {
                    method: 'DELETE',
                })
                if (!resp.ok) {
                    throw new Error(resp.statusText)
                }
                this.fetchRecent()
            }
        }))
    })
  </script>
</body>
</html>
